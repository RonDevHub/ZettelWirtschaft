steps:
  # --- 1. Main-Branch (App & Web) ---
  publish-app-latest:
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: ghcr.io
      repo: ghcr.io/rondevhub/zettelwirtschaft-app
      username: { from_secret: ghcr_user }
      password: { from_secret: ghcr_token }
      dockerfile: docker/Dockerfile
      context: .
      tags: latest
    when:
      event: push
      branch: main

  publish-web-latest:
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: ghcr.io
      repo: ghcr.io/rondevhub/zettelwirtschaft-web
      username: { from_secret: ghcr_user }
      password: { from_secret: ghcr_token }
      dockerfile: docker/Dockerfile.nginx
      context: .
      tags: latest
    when:
      event: push
      branch: main

  # --- 2. Beta-Branch (App & Web) ---
  publish-app-beta:
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: ghcr.io
      repo: ghcr.io/rondevhub/zettelwirtschaft-app
      username: { from_secret: ghcr_user }
      password: { from_secret: ghcr_token }
      dockerfile: docker/Dockerfile
      context: .
      tags: beta
    when:
      event: manual
      branch: beta

  publish-web-beta:
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: ghcr.io
      repo: ghcr.io/rondevhub/zettelwirtschaft-web
      username: { from_secret: ghcr_user }
      password: { from_secret: ghcr_token }
      dockerfile: docker/Dockerfile.nginx
      context: .
      tags: beta
    when:
      event: manual
      branch: beta

  # --- 3. Release-Tags (App & Web) ---
  publish-app-tag:
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: ghcr.io
      repo: ghcr.io/rondevhub/zettelwirtschaft-app
      username: { from_secret: ghcr_user }
      password: { from_secret: ghcr_token }
      dockerfile: docker/Dockerfile
      context: .
      tags: ${CI_COMMIT_TAG}
    when:
      event: tag

  publish-web-tag:
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: ghcr.io
      repo: ghcr.io/rondevhub/zettelwirtschaft-web
      username: { from_secret: ghcr_user }
      password: { from_secret: ghcr_token }
      dockerfile: docker/Dockerfile.nginx
      context: .
      tags: ${CI_COMMIT_TAG}
    when:
      event: tag

  # --- 4. PHP Lint ---
  lint:
    image: php:8.3-alpine
    commands:
      - find src -name "*.php" -exec php -l {} \;
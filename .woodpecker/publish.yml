steps:
  # --- 1. Main-Branch ---
  publish-latest:
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: ghcr.io
      repo: ghcr.io/rondevhub/zettelwirtschaft
      username:
        from_secret: ghcr_user
      password:
        from_secret: ghcr_token
      dockerfile: docker/Dockerfile
      context: .
      tags: latest
    when:
      event: push
      branch: main

  # --- 2. Beta-Branch ---
  publish-beta:
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: ghcr.io
      repo: ghcr.io/rondevhub/zettelwirtschaft
      username:
        from_secret: ghcr_user
      password:
        from_secret: ghcr_token
      dockerfile: docker/Dockerfile
      context: .
      tags: beta
    when:
      event: manual
      branch: beta

  # --- 3. Release-Tags ---
  publish-tag:
    image: woodpeckerci/plugin-kaniko
    settings:
      registry: ghcr.io
      repo: ghcr.io/rondevhub/zettelwirtschaft
      username:
        from_secret: ghcr_user
      password:
        from_secret: ghcr_token
      dockerfile: docker/Dockerfile
      context: .
      tags: ${CI_COMMIT_TAG}
    when:
      event: tag

  # --- 4. PHP Lint ---
  lint:
    image: php:8.3-alpine
    commands:
      - find src -name "*.php" -exec php -l {} \;
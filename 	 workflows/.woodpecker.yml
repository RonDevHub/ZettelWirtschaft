kind: pipeline
name: default

steps:
  build:
    image: plugins/docker
    settings:
      registry: ghcr.io
      repo: ghcr.io/rondevhub/zettelwirtschaft
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      dockerfile: docker/Dockerfile
      tags:
        - latest
        - ${CI_COMMIT_SHA:0:8}
      platforms:
        - linux/amd64
        - linux/arm64

  lint:
    image: php:8.3-alpine
    commands:
      - find src -name "*.php" -exec php -l {} \;
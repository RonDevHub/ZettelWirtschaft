server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    
    # Der Root-Pfad muss auf den public-Ordner zeigen
    root /var/www/html/public;

    location / {
        # Prüft erst, ob die Datei existiert, ansonsten Rewrite auf index.php
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        
        # 'app' entspricht dem Service-Namen in deinem Portainer-Stack
        fastcgi_pass app:9000;
        
        fastcgi_index index.php;
        include fastcgi_params;
        
        # WICHTIG: Das $document_root entspricht /var/www/html/public
        # Der app-Container findet dort die index.php
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        
        # Verhindert "File not found" durch explizites Error-Handling
        fastcgi_intercept_errors on;
    }

    # Logging für einfachere Fehlersuche
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}